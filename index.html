  class Particle {
    constructor(worldX, worldY, color, type = 'sparkle') {
      this.x = worldX;
      this.y = worldY;
      this.color = color;
      this.type = type;
      this.size = Math.random() * 3 + 1.5;
      if (type === 'heart') this.size = Math.random() * 5 + 3.5;

      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 0.8 + 0.3;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 0.2;

      this.alpha = 1;
      this.decay = Math.random() * 0.012 + 0.008;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.alpha -= this.decay;
    }

    draw(ctx, camera) {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle = this.color;

      const screenX = this.x - camera.x;
      const screenY = this.y - camera.y;

      if (this.type === 'heart') {
        ctx.beginPath();
        ctx.moveTo(screenX, screenY);
        ctx.bezierCurveTo(screenX - this.size/2, screenY - this.size/2, screenX - this.size, screenY + this.size/3, screenX, screenY + this.size);
        ctx.bezierCurveTo(screenX + this.size, screenY + this.size/3, screenX + this.size/2, screenY - this.size/2, screenX, screenY);
        ctx.fill();
      } else {
        ctx.shadowBlur = 6;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(screenX, screenY, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  class Collectible {
    constructor(worldX, worldY) {
      this.x = worldX;
      this.y = worldY;
      this.size = Math.random() * 6 + 10;
      this.type = Math.random() > 0.5 ? 'flower' : 'heart';
      this.hue = this.type === 'flower' ? Math.random() * 60 + 290 : 350;
      this.angle = Math.random() * Math.PI * 2;
      this.pulseSpeed = Math.random() * 0.03 + 0.015;
      this.wiggle = Math.random() * Math.PI * 2;
      this.wiggleSpeed = Math.random() * 0.02 + 0.01;
    }

    update() {
      this.angle += this.pulseSpeed;
      this.wiggle += this.wiggleSpeed;
    }

    draw(ctx, camera) {
      ctx.save();
      const screenX = this.x - camera.x;
      const screenY = this.y - camera.y;

      ctx.shadowBlur = 18;
      ctx.shadowColor = `hsla(${this.hue}, 100%, 75%, 0.45)`;

      const pulseScale = 1 + Math.sin(this.angle) * 0.12;
      const currentSize = this.size * pulseScale;

      ctx.translate(screenX, screenY);
      ctx.rotate(Math.sin(this.wiggle) * 0.15);

      if (this.type === 'flower') {
        ctx.rotate(this.angle * 0.05);
        ctx.fillStyle = `hsla(${this.hue}, 90%, 75%, 0.95)`;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.ellipse(0, -currentSize/2, currentSize/3.2, currentSize/1.4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.rotate((Math.PI * 2) / 5);
        }
        ctx.beginPath();
        ctx.arc(0, 0, currentSize/3.8, 0, Math.PI * 2);
        ctx.fillStyle = '#fff4bc';
        ctx.fill();
      } else {
        ctx.fillStyle = `hsla(${this.hue}, 95%, 70%, 0.95)`;
        ctx.beginPath();
        ctx.moveTo(0, -currentSize/4);
        ctx.bezierCurveTo(-currentSize/2, -currentSize, -currentSize, -currentSize/3, 0, currentSize/1.3);
        ctx.bezierCurveTo(currentSize, -currentSize/3, currentSize/2, -currentSize, 0, -currentSize/4);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  class Butterfly {
    constructor() {
      this.x = 0;
      this.y = 0;
      this.vx = 0;
      this.vy = 0;
      this.size = 23;
      this.wingFlap = 0;
      this.color1 = '#ffb7d5';
      this.color2 = '#c5b7ff';
      this.angle = 0;
    }

    update(touch, canvas) {
      if (touch.isDown) {
        const dx = touch.screenX - (canvas.width / 2);
        const dy = touch.screenY - (canvas.height / 2);
        const dist = Math.hypot(dx, dy);

        if (dist > 15) {
          const targetAngle = Math.atan2(dy, dx);
          const maxSpeed = 5.2;
          const targetSpeed = Math.min(dist * 0.04, maxSpeed);

          this.vx += (Math.cos(targetAngle) * targetSpeed - this.vx) * 0.10;
          this.vy += (Math.sin(targetAngle) * targetSpeed - this.vy) * 0.10;
        }
      } else {
        this.vx *= 0.95;
        this.vy *= 0.95;
      }

      this.x += this.vx;
      this.y += this.vy;

      const currentVelocity = Math.hypot(this.vx, this.vy);

      if (currentVelocity > 0.3) {
        const targetAngle = Math.atan2(this.vy, this.vx) + Math.PI / 2;
        let angleDiff = targetAngle - this.angle;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;

        this.angle += angleDiff * 0.14;
      }

      const flapSpeed = 0.08 + Math.min(currentVelocity * 0.02, 0.14);
      this.wingFlap += flapSpeed;
    }

    draw(ctx, camera) {
      ctx.save();
      const screenX = this.x - camera.x;
      const screenY = this.y - camera.y;

      ctx.translate(screenX, screenY);
      ctx.rotate(this.angle);

      ctx.shadowBlur = 25;
      ctx.shadowColor = 'rgba(244, 143, 177, 0.75)';

      const flapWidth = Math.abs(Math.sin(this.wingFlap));

      const gradL = ctx.createRadialGradient(-this.size/2, -this.size/2, 2, -this.size, -this.size, this.size*1.6);
      gradL.addColorStop(0, this.color1);
      gradL.addColorStop(1, this.color2);

      const gradR = ctx.createRadialGradient(this.size/2, -this.size/2, 2, this.size, -this.size, this.size*1.6);
      gradR.addColorStop(0, this.color1);
      gradR.addColorStop(1, this.color2);

      ctx.fillStyle = gradL;
      ctx.beginPath();
      ctx.bezierCurveTo(-3, -2, -this.size * 2 * flapWidth, -this.size * 1.5, -this.size * 1.8 * flapWidth, -this.size * 0.2);
      ctx.bezierCurveTo(-this.size * 1.5 * flapWidth, 0.2, -5, -1, 0, 0);
      ctx.bezierCurveTo(-2, 2, -this.size * 1.5 * flapWidth, this.size * 1.4, -this.size * 1.1 * flapWidth, this.size * 0.5);
      ctx.bezierCurveTo(-this.size * 0.8 * flapWidth, 0.2, -2, 0, 0, 0);
      ctx.fill();

      ctx.fillStyle = gradR;
      ctx.beginPath();
      ctx.bezierCurveTo(3, -2, this.size * 2 * flapWidth, -this.size * 1.5, this.size * 1.8 * flapWidth, -this.size * 0.2);
      ctx.bezierCurveTo(this.size * 1.5 * flapWidth, 0.2, 5, -1, 0, 0);
      ctx.bezierCurveTo(2, 2, this.size * 1.5 * flapWidth, this.size * 1.4, this.size * 1.1 * flapWidth, this.size * 0.5);
      ctx.bezierCurveTo(this.size * 0.8 * flapWidth, 0.2, 2, 0, 0, 0);
      ctx.fill();

      ctx.fillStyle = '#ffeff6';
      ctx.beginPath();
      ctx.ellipse(0, 0, 2.5, this.size * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-1, -this.size * 0.6);
      ctx.quadraticCurveTo(-4, -this.size * 1.1, -7, -this.size * 1.0);
      ctx.moveTo(1, -this.size * 0.6);
      ctx.quadraticCurveTo(4, -this.size * 1.1, 7, -this.size * 1.0);
      ctx.stroke();

      ctx.restore();
    }
  }

  class Firefly {
    constructor(worldX, worldY) {
      this.x = worldX;
      this.y = worldY;
      this.size = Math.random() * 2 + 1;
      this.angle = Math.random() * Math.PI * 2;
      this.speed = Math.random() * 0.3 + 0.1;
    }

    update() {
      this.angle += Math.random() * 0.04 - 0.02;
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed - 0.08;
    }

    draw(ctx, camera) {
      ctx.save();
      const screenX = this.x - camera.x;
      const screenY = this.y - camera.y;

      ctx.globalAlpha = 0.3 + Math.abs(Math.sin(this.angle)) * 0.5;
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ffe399';
      ctx.fillStyle = '#ffe399';
      ctx.beginPath();
      ctx.arc(screenX, screenY, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class GameEngine {
    constructor() {
      this.canvas = document.getElementById('gameCanvas');
      this.ctx = this.canvas.getContext('2d');
      this.butterfly = new Butterfly();

      this.camera = { x: 0, y: 0, targetX: 0, targetY: 0, lerpSpeed: 0.08 };
      this.touch = { screenX: 0, screenY: 0, isDown: false };

      this.particles = [];
      this.collectibles = [];
      this.fireflies = [];
      this.complimentPool = [...COMPLIMENTS];

      this.loveToast = document.getElementById('loveToast');
      this.toastSpanish = document.getElementById('toastSpanish');

      this.init();
    }

    init() {
      this.resizeCanvas();
      window.addEventListener('resize', () => this.resizeCanvas());

      this.camera.x = this.butterfly.x - this.canvas.width / 2;
      this.camera.y = this.butterfly.y - this.canvas.height / 2;

      this.setupControls();
      this.generateWorld();
    }

    resizeCanvas() {
      this.canvas.width = window.innerWidth;
      this.canvas.height = window.innerHeight;
    }

    setupControls() {
      const updatePos = (clientX, clientY) => {
        this.touch.screenX = clientX;
        this.touch.screenY = clientY;
      };

      window.addEventListener('touchstart', (e) => {
        this.touch.isDown = true;
        if (e.touches.length > 0) {
          updatePos(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: false });

      window.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          updatePos(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: false });

      window.addEventListener('touchend', () => {
        this.touch.isDown = false;
      });

      window.addEventListener('mousedown', (e) => {
        this.touch.isDown = true;
        updatePos(e.clientX, e.clientY);
      });

      window.addEventListener('mousemove', (e) => {
        updatePos(e.clientX, e.clientY);
      });

      window.addEventListener('mouseup', () => {
        this.touch.isDown = false;
      });
    }

    generateWorld() {
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 800;
        this.fireflies.push(new Firefly(Math.cos(angle) * dist, Math.sin(angle) * dist));
      }

      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 700 + 200;
        this.collectibles.push(new Collectible(Math.cos(angle) * dist, Math.sin(angle) * dist));
      }
    }

    checkAndRegenerateEntities() {
      this.collectibles.forEach(item => {
        const dist = Math.hypot(item.x - this.butterfly.x, item.y - this.butterfly.y);
        if (dist > 1100) {
          let spawnAngle = Math.random() * Math.PI * 2;
          const speed = Math.hypot(this.butterfly.vx, this.butterfly.vy);

          if (speed > 0.5) {
            const heading = Math.atan2(this.butterfly.vy, this.butterfly.vx);
            spawnAngle = heading + (Math.random() * 1.5 - 0.75);
          }

          const spawnDist = Math.random() * 250 + 600;
          item.x = this.butterfly.x + Math.cos(spawnAngle) * spawnDist;
          item.y = this.butterfly.y + Math.sin(spawnAngle) * spawnDist;
        }
      });

      this.fireflies.forEach(f => {
        const dist = Math.hypot(f.x - this.butterfly.x, f.y - this.butterfly.y);
        if (dist > 1200) {
          const angle = Math.random() * Math.PI * 2;
          const spawnDist = Math.random() * 300 + 800;
          f.x = this.butterfly.x + Math.cos(angle) * spawnDist;
          f.y = this.butterfly.y + Math.sin(angle) * spawnDist;
        }
      });
    }

    showCompliment() {
      if (this.complimentPool.length === 0) {
        this.complimentPool = [...COMPLIMENTS];
      }
      const randIdx = Math.floor(Math.random() * this.complimentPool.length);
      const compliment = this.complimentPool.splice(randIdx, 1)[0];

      this.loveToast.classList.remove('toast-active');
      void this.loveToast.offsetWidth;

      this.toastSpanish.textContent = compliment.es;

      this.loveToast.classList.add('toast-active');
    }

    run() {
      const animateLoop = () => {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        this.butterfly.update(this.touch, this.canvas);

        const targetCamX = this.butterfly.x - this.canvas.width / 2;
        const targetCamY = this.butterfly.y - this.canvas.height / 2;
        this.camera.x += (targetCamX - this.camera.x) * this.camera.lerpSpeed;
        this.camera.y += (targetCamY - this.camera.y) * this.camera.lerpSpeed;

        this.fireflies.forEach(f => {
          f.update();
          f.draw(this.ctx, this.camera);
        });

        const isMoving = Math.hypot(this.butterfly.vx, this.butterfly.vy) > 0.4;
        if (isMoving) {
          if (Math.random() < 0.40) {
            this.particles.push(new Particle(this.butterfly.x, this.butterfly.y, 'rgba(255,182,193,0.7)', 'sparkle'));
          }
          if (Math.random() < 0.15) {
            this.particles.push(new Particle(this.butterfly.x, this.butterfly.y, 'rgba(244,143,177,0.85)', 'heart'));
          }
        }

        for (let i = this.particles.length - 1; i >= 0; i--) {
          this.particles[i].update();
          this.particles[i].draw(this.ctx, this.camera);
          if (this.particles[i].alpha <= 0) {
            this.particles.splice(i, 1);
          }
        }

        this.butterfly.draw(this.ctx, this.camera);

        this.collectibles.forEach(item => {
          item.update();
          item.draw(this.ctx, this.camera);

          const distance = Math.hypot(this.butterfly.x - item.x, this.butterfly.y - item.y);
          if (distance < this.butterfly.size + item.size) {
            const burstColor = item.type === 'flower' ? `hsla(${item.hue}, 95%, 75%, 1)` : '#ff547d';
            for (let p = 0; p < 15; p++) {
              this.particles.push(new Particle(item.x, item.y, burstColor, item.type === 'heart' ? 'heart' : 'sparkle'));
            }

            this.showCompliment();

            const angle = Math.random() * Math.PI * 2;
            const spawnDist = Math.random() * 300 + 600;
            item.x = this.butterfly.x + Math.cos(angle) * spawnDist;
            item.y = this.butterfly.y + Math.sin(angle) * spawnDist;
            item.hue = item.type === 'flower' ? Math.random() * 60 + 290 : 350;
          }
        });

        this.checkAndRegenerateEntities();
        requestAnimationFrame(animateLoop);
      };

      animateLoop();
    }
  }

  window.onload = () => {
    const engine = new GameEngine();
    engine.run();
  };
</script>
</body>
</html>
